<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To My Maze</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<div class="edge-container">
    <img src="images/en-large.jpg" alt="Image 1">
    <img src="images/hero.avif" alt="Image 2">
    <img src="images/logo200.png" alt="Image 3">
</div>
<div id="middle-container">
    <div id="canvas-container">
        <canvas id="mazeID">
        </canvas>
        <div id="counter-container">
            <div>
                <h1>
                    Steps Counter
                </h1>
            </div>
            <div>
                <label id="counter">
                    Test Path Steps : 0
                </label>
                <label id="s-counter">
                    Solution Path Steps : 0
                </label>
            </div>
            <div id="elements-container">
                <label>
                    <img alt="#" src="images/icons8-wall-32.png">
                    <input type="radio" id="vertical" name="tool" value="wall" checked> Horizontal
                </label>
                <label>
                    <img alt="#" src="images/icons8-wall-32.png">
                    <input type="radio" id="horizontal" name="tool" value="wall" checked> Vertical
                </label>
                <label>
                    <img alt="#" src="images/icons8-person-30.png">
                    <input type="radio" id="start" name="tool" value="start"> Start Point
                </label>
                <label>
                    <img alt="#" src="images/icons8-goal-32.png">
                    <input type="radio" id="end" name="tool" value="end"> End Point
                </label>
            </div>
            <button id="clearCanvas">
                Clear
            </button>
        </div>
    </div>
    <div id="button-container">
        <div id="first">
            <button id="buttonRandom">
                Generate Random Maze
            </button>
            <button id="buttonBuild">
                Build Your Own Maze
            </button>
            <button id="next">
                Next
            </button>
        </div>
        <div id="second">
            <button id="from2To1">
                back
            </button>
            <button class="algo-buttons" id="button1">
                A* Algorithm
            </button>
            <button class="algo-buttons" id="button2">
                Uniform Cost Search Algorithm
            </button>
            <button class="algo-buttons" id="button3">
                Best First Search Algorithm
            </button>
        </div>

        <div id="third">
            <button id="back">
                back
            </button>

            <button id="heuristic1">
                Manhattan distance
            </button>
            <button id="heuristic2">
                Euclidean distance
            </button>
        </div>
        <div id="input-container">
            <input id="cols" type="number" placeholder="cols">
            <input id="rows" type="number" placeholder="rows">
            <button id="submit">
                Submit
            </button>
        </div>
    </div>
</div>
<div class="edge-container">
    <img src="images/maxresdefault.jpg" alt="Image 1">
    <img src="images/maze.gif" alt="Image 2">
    <img src="images/snake.png" alt="Image 3">
</div>
<script src="js/index.js"></script>
</body>
</html>
