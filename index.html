<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<div class="edge-container"></div>
<div id="middle-container">
    <div id="canvas-container">
        <canvas id="mazeID">
        </canvas>
        <div id="counter-container">
            <div>
                <h1>
                    Steps Counter
                </h1>
            </div>
            <div>
                <label id="counter">
                    Steps : 0
                </label>
            </div>
            <div id="elements-container">
                <label>
                    <img alt="#" src="images/icons8-wall-32.png">
                    <input type="radio" name="tool" value="wall" checked> Wall
                </label>
                <label>
                    <img alt="#" src="images/icons8-person-30.png">
                    <input type="radio" name="tool" value="start"> Start Point
                </label>
                <label>
                    <img alt="#" src="images/icons8-goal-32.png">
                    <input type="radio" name="tool" value="end"> End Point
                </label>
            </div>
        </div>
    </div>
    <div id="button-container">
        <button id="buttonRandom">
            Generate Random Maze
        </button>
        <button id="buttonBuild">
            Build Your Own Maze
        </button>
        <button id="next" disabled>
            Next
        </button>
        <button class="algo-buttons" id="from2To1">
            back
        </button>
        <button class="algo-buttons" id="button1">
            A* Algorithm
        </button>
        <button class="algo-buttons" id="button2">
            Uniform Cost Search Algorithm
        </button>
        <button class="algo-buttons" id="button3">
            Best First Search Algorithm
        </button>
        <button id="previous">
            back
        </button>

        <button id="heuristic1">
            Manhattan distance
        </button>
        <button id="heuristic2">
            Euclidean distance
        </button>
    </div>
</div>
<div class="edge-container"></div>
<script src="js/index.js"></script>
</body>
</html>
